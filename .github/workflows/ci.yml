name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  build_ruby:
    strategy:
      matrix:
        os: [ubuntu-22.04]
        ruby: ['3.4']
        include:
          - os: ubuntu-22.04
            ruby: truffleruby-34.0.1
          - os: ubuntu-22.04
            ruby: jruby-9.4.14.0
          - os: macos-latest
            ruby: '3.4'
          # Windows stays on Ruby 3.2: the pinned nokogiri 1.14.x (via
          # asciidoctor-doctest) only ships a prebuilt x64-mingw-ucrt gem for
          # Ruby >= 3.1, < 3.3, and it fails to build from source on Ruby 3.4.
          - os: windows-latest
            ruby: '3.2'
    runs-on: ${{ matrix.os }}
    env:
      JRUBY_OPTS: '-J-XX:+TieredCompilation -J-XX:TieredStopAtLevel=1 -J-Xss2m -Xcompile.invokedynamic=false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Configure Nokogiri installation (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          bundle config --local build__nokogiri --use-system-libraries
          sudo apt-get install libxslt1-dev
      - name: Configure Nokogiri installation (macOS)
        if: matrix.os == 'macos-latest'
        run: bundle config --local build__nokogiri --use-system-libraries
      - name: Set JRUBY_OPTS
        if: matrix.jruby-opts
        run: echo 'JRUBY_OPTS=${{ matrix.jruby-opts }}' >> $GITHUB_ENV
      - name: Install dependencies
        run: bundle --jobs 3 --retry 3
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Run tests
        run: bundle exec rake test
      - name: Install reveal.js
        run: npm ci
      - name: Run examples:convert
        run: bundle exec rake examples:convert
  build_js:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      # The JS parity tests compare the converter output byte-for-byte against
      # the Ruby reference converter, so the Ruby toolchain is required too.
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
      - name: Install dependencies
        # The parity tests only need the asciidoctor runtime, so skip the
        # development group: it pulls in nokogiri, which has no prebuilt gem for
        # Ruby 3.4 on Windows and fails to build from source there.
        run: |
          bundle config set --local without development
          bundle --jobs 3 --retry 3
          npm ci
      - name: Run tests
        run: npm test
      - name: Build single executable
        run: npm run build:sea
