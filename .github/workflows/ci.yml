name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  build_ruby:
    strategy:
      matrix:
        os: [ubuntu-22.04]
        ruby: ['3.4']
        test_task: [test]
        include:
          # JRuby/TruffleRuby run test:unit only (not the full test, which
          # also runs the asciidoc-testkit corpus): these legs exist to catch
          # Ruby-implementation compat bugs, not to re-validate fixture
          # content, which the CRuby legs already do exhaustively — and the
          # corpus's ~300 sequential `bundle exec` spawns (asciidoc-testkit
          # has no persistent-worker mode yet) multiply JVM startup cost into
          # a 10+ minute job.
          - os: ubuntu-22.04
            ruby: truffleruby-34.0.1
            test_task: test:unit
          - os: ubuntu-22.04
            ruby: jruby-9.4.14.0
            test_task: test:unit
          - os: macos-latest
            ruby: '3.4'
            test_task: test
          - os: windows-latest
            ruby: '3.4'
            test_task: test
    runs-on: ${{ matrix.os }}
    env:
      JRUBY_OPTS: '-J-XX:+TieredCompilation -J-XX:TieredStopAtLevel=1 -J-Xss2m -Xcompile.invokedynamic=false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Set JRUBY_OPTS
        if: matrix.jruby-opts
        run: echo 'JRUBY_OPTS=${{ matrix.jruby-opts }}' >> $GITHUB_ENV
      - name: Install dependencies
        run: bundle --jobs 3 --retry 3
      - name: Install npm dependencies
        run: npm ci
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Run tests
        run: bundle exec rake ${{ matrix.test_task }}
      - name: Run examples:convert
        run: bundle exec rake examples:convert
      - name: Run release_notes:convert
        run: bundle exec rake release_notes:convert
  build_js:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      # The JS parity tests compare the converter output byte-for-byte against
      # the Ruby reference converter, so the Ruby toolchain is required too.
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
      - name: Install dependencies
        # The parity tests only need the asciidoctor runtime, not the
        # rubocop/testkit/etc. development group.
        run: |
          bundle config set --local without development
          bundle --jobs 3 --retry 3
          npm ci
      - name: Run tests
        run: npm test
      - name: Build single executable
        run: npm run build:sea
