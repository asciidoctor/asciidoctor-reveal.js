name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 5.3.0 or 5.3.0-beta.1)'
        required: true
        type: string

# Allow the prepare job to push the release commits and tag, and the publish
# job to create the GitHub release.
permissions:
  contents: write
  id-token: write

jobs:
  # Bump the version, build, run the tests and, only if everything is green,
  # commit + tag and push upstream. The tag stays local until the tests pass,
  # so a failing build never leaks a release tag.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Configure Nokogiri installation (Linux)
        run: |
          bundle config --local build__nokogiri --use-system-libraries
          sudo apt-get install libxslt1-dev
      - name: Install dependencies
        run: |
          bundle --jobs 3 --retry 3
          npm ci
      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      # bumps package.json + version.rb, builds, then commits and tags locally
      - name: Prepare release
        run: npm run release:prepare ${{ inputs.version }}
      - name: Run tests
        run: |
          bundle exec rake test
          bundle exec rake examples:convert
          npm test
      # only reached when the tests above succeed
      - name: Push release commits and tag
        run: git push origin master --tags

  publish_ruby:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
      - uses: ruby/setup-ruby@v1
      - name: Install dependencies
        run: bundle --jobs 3 --retry 3
      # Builds the gem and pushes it via RubyGems trusted publishing (OIDC);
      # `rake release` skips re-tagging because the tag already exists.
      - uses: rubygems/release-gem@v1

  publish_js:
    needs: publish_ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      # The JS parity tests compare the converter output byte-for-byte against
      # the Ruby reference converter, so the Ruby toolchain is required too.
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
      - name: Configure Nokogiri installation (Linux)
        run: |
          bundle config --local build__nokogiri --use-system-libraries
          sudo apt-get install libxslt1-dev
      # npm trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: |
          bundle --jobs 3 --retry 3
          npm ci
      - name: Test
        run: npm t
      # Publishes via npm trusted publishing (OIDC) — no auth token required.
      - name: Publish to npm
        run: npm publish

  # Build the Single Executable Application binary on a native runner per
  # target. SEA cannot cross-compile, so each platform/architecture is built
  # on its own runner and uploaded as an artifact.
  build_binaries:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: asciidoctor-revealjs-linux-amd64
          - os: ubuntu-24.04-arm
            asset: asciidoctor-revealjs-linux-arm64
          - os: macos-latest
            asset: asciidoctor-revealjs-macos-arm64
          - os: windows-latest
            asset: asciidoctor-revealjs-win-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build single executable
        run: npm run build:sea
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # Once npm, RubyGems and every binary are ready, gather the binaries and
  # publish the GitHub release.
  # --prerelease is added automatically for versions carrying a pre-release suffix (e.g. 5.3.0-beta.1)
  publish_release:
    needs: [publish_js, build_binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate changelog
        run: npm run release:description ${{ inputs.version }}
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file dist/changelog.md \
            ${{ contains(inputs.version, '-') && '--prerelease' || '' }} \
            dist/asciidoctor-revealjs-linux-amd64 \
            dist/asciidoctor-revealjs-linux-arm64 \
            dist/asciidoctor-revealjs-macos-arm64 \
            dist/asciidoctor-revealjs-win-amd64.exe
